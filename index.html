<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>quick question</title>

<style>

body{
font-family: Helvetica, sans-serif;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.page{
display:none;
}

.active{
display:block;
}

button{
background:white;
color:black;
border:none;
padding:12px 25px;
margin:10px;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:0.8;
}

</style>
</head>

<body>

<div id="page1" class="page active">
<h1>hi</h1>
<p>quick question</p>
<button onclick="nextPage(2)">continue</button>
</div>

<div id="page2" class="page">
<h2>are you free</h2>
<p>thursday · 12 march · 12pm</p>
<button onclick="nextPage(3)">yes</button>
<button onclick="moveButton(this)">no</button>
</div>

<div id="page3" class="page">
<h2>perfect</h2>
<p>you just agreed to a date</p>
<button onclick="nextPage(4)">continue</button>
</div>

<div id="page4" class="page">
<h2>terms & conditions</h2>
<p>
whole day if i can handle it<br>
no phone<br>
get your camera<br>
be on your best behaviour<br>
</p>
<button onclick="nextPage(5)">accept</button>
</div>

<div id="page5" class="page">
<h1>ok good</h1>
<p>see you thursday :)</p>
</div>

<script>

function nextPage(n){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
document.getElementById('page'+n).classList.add('active')
}

function moveButton(btn){
btn.style.position='absolute'
btn.style.left=Math.random()*80+'%'
btn.style.top=Math.random()*80+'%'
}

</script>

</body>
</html>
